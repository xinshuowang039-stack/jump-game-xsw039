<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素跳一跳 - 2D小游戏</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    user-select: none;
    overflow: hidden;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .game-wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 800px;
    padding: 0 10px;
  }
  .info {
    color: #ccc;
    font-family: 'Press Start 2P', 'Microsoft YaHei', monospace;
    font-size: 11px;
    text-shadow: 2px 2px 0 #000;
  }
  .info span { color: #ffd700; font-size: 14px; }
  canvas {
    border: 4px solid #444;
    box-shadow: 0 0 0 4px #1a1a1a, 0 0 0 8px #333, 0 0 30px rgba(100,100,255,0.2);
    cursor: pointer;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .hint {
    color: #aaa;
    font-family: 'Press Start 2P', 'Microsoft YaHei', monospace;
    font-size: 9px;
    text-align: center;
    height: 24px;
    line-height: 24px;
    transition: color 0.2s;
    text-shadow: 1px 1px 0 #000;
  }
  .hint.charging { color: #ff4444; animation: blink 0.5s steps(1) infinite; }
  .hint.ready { color: #44ff44; }
  @keyframes blink { 50% { opacity: 0; } }

  /* 设置按钮 */
  .settings-btn {
    position: absolute;
    top: 8px; right: 8px;
    width: 36px; height: 36px;
    background: #333;
    border: 3px solid #555;
    color: #ccc;
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    cursor: pointer;
    text-align: center;
    line-height: 30px;
    z-index: 10;
  }
  .settings-btn:hover { background: #555; }
  .settings-btn.active { background: #666; border-color: #ffd700; }

  /* 设置面板 */
  .settings-panel {
    position: absolute;
    top: 50px; right: 8px;
    background: #1a1a1a;
    border: 3px solid #555;
    padding: 16px;
    z-index: 10;
    display: none;
    min-width: 220px;
  }
  .settings-panel.show { display: block; }
  .settings-panel label {
    display: block;
    color: #ccc;
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    margin-bottom: 8px;
    text-shadow: 1px 1px 0 #000;
  }
  .settings-panel .val { color: #ffd700; font-size: 10px; }
  .settings-panel input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 12px;
    background: #333;
    border: 2px solid #555;
    outline: none;
    margin: 6px 0 12px;
  }
  .settings-panel input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: #ffd700;
    border: 2px solid #000;
    cursor: pointer;
  }
  .settings-panel .preset-row { display: flex; gap: 4px; margin-top: 8px; }
  .settings-panel .preset-btn {
    flex: 1;
    padding: 5px 0;
    background: #333;
    border: 2px solid #555;
    color: #aaa;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    cursor: pointer;
    text-align: center;
  }
  .settings-panel .preset-btn:hover { background: #555; color: #fff; }
  .settings-panel .preset-btn.on { border-color: #ffd700; color: #ffd700; }
  .settings-panel .close-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 7px 0;
    background: #444;
    border: 2px solid #666;
    color: #ccc;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    cursor: pointer;
  }
  .settings-panel .close-btn:hover { background: #666; }

  /* 起始菜单覆盖层 */
  .menu-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 800px; height: 500px;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
    gap: 24px;
  }
  .menu-overlay.show { display: flex; }
  .menu-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 28px;
    color: #ffd700;
    text-shadow: 4px 4px 0 #000, 0 0 20px #ffd70040;
    margin-bottom: 10px;
  }
  .menu-subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #888;
    text-shadow: 1px 1px 0 #000;
    margin-top: -16px;
    margin-bottom: 16px;
  }
  .menu-btn {
    width: 260px;
    padding: 14px 0;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    border: 3px solid #555;
    cursor: pointer;
    text-align: center;
    color: #ccc;
    background: #1a1a2e;
    transition: all 0.1s;
    text-shadow: 2px 2px 0 #000;
  }
  .menu-btn:hover {
    border-color: #ffd700;
    color: #ffd700;
    background: #222244;
    transform: scale(1.05);
  }
  .menu-btn.primary {
    border-color: #44cc44;
    color: #44ff44;
  }
  .menu-btn.primary:hover {
    border-color: #44ff44;
    background: #1a2e1a;
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="header">
    <div class="info" id="infoLeft">关卡 <span id="levelText">1</span>/10</div>
    <div class="info">分数 <span id="scoreText">0</span></div>
    <div class="info" id="infoRight">剩余 <span id="remainText">0</span></div>
  </div>
  <div style="position:relative; display:inline-block;">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
    <!-- 起始菜单 -->
    <div class="menu-overlay show" id="menuOverlay">
      <div class="menu-title">跳一跳</div>
      <div class="menu-subtitle">PIXEL JUMPER</div>
      <button class="menu-btn primary" id="btnEndless">无尽模式</button>
      <button class="menu-btn" id="btnLevel">关卡模式</button>
    </div>
    <!-- 设置 -->
    <button class="settings-btn" id="settingsBtn" title="灵敏度设置" style="display:none;">⚙</button>
    <div class="settings-panel" id="settingsPanel">
      <label>鼠标灵敏度 <span class="val" id="sensVal">5</span></label>
      <input type="range" id="sensSlider" min="1" max="10" value="5" step="1">
      <div class="preset-row">
        <button class="preset-btn" data-v="2">慢速</button>
        <button class="preset-btn on" data-v="5">标准</button>
        <button class="preset-btn" data-v="8">快速</button>
        <button class="preset-btn" data-v="10">极速</button>
      </div>
      <button class="close-btn" id="closeSettings">关闭 [X]</button>
      <button class="close-btn" id="btnBackMenu" style="margin-top:6px; border-color:#cc4444; color:#ff6666;">返回主菜单</button>
    </div>
  </div>
  <div class="hint ready" id="hint">按住鼠标蓄力，松开起跳</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
// HiDPI 清晰渲染：用设备像素比提高画布分辨率
const DPR = Math.min(window.devicePixelRatio || 1, 2);
canvas.width = 800 * DPR;
canvas.height = 500 * DPR;
canvas.style.width = '800px';
canvas.style.height = '500px';
ctx.scale(DPR, DPR);
ctx.imageSmoothingEnabled = false;

function px(v) { return Math.floor(v); }

// === 关卡配置 ===
const LEVELS = [
  { name:'第1关', platforms:4,  minGap:100, maxGap:160, moving:0, speed:0,   narrow:1.0 },
  { name:'第2关', platforms:5,  minGap:120, maxGap:190, moving:0, speed:0,   narrow:1.0 },
  { name:'第3关', platforms:5,  minGap:130, maxGap:210, moving:1, speed:0.4, narrow:0.95 },
  { name:'第4关', platforms:6,  minGap:140, maxGap:230, moving:1, speed:0.6, narrow:0.9 },
  { name:'第5关', platforms:6,  minGap:150, maxGap:250, moving:2, speed:0.7, narrow:0.85 },
  { name:'第6关', platforms:7,  minGap:160, maxGap:270, moving:2, speed:0.9, narrow:0.8 },
  { name:'第7关', platforms:7,  minGap:170, maxGap:290, moving:3, speed:1.0, narrow:0.75 },
  { name:'第8关', platforms:8,  minGap:180, maxGap:300, moving:3, speed:1.2, narrow:0.7 },
  { name:'第9关', platforms:8,  minGap:200, maxGap:330, moving:4, speed:1.3, narrow:0.65 },
  { name:'最终关', platforms:9,  minGap:210, maxGap:350, moving:4, speed:1.5, narrow:0.6 },
];

const GRAVITY = 0.6;
const PLAYER_SIZE = 20;
const PLATFORM_H = 12;
const MAX_POWER = 18;
const BASE_POWER_RATE = 0.06;

let sensitivity = parseInt(localStorage.getItem('jump_sens') || '5');
let POWER_RATE = BASE_POWER_RATE * (sensitivity / 5);

let cameraX = 0;
let targetCameraX = 0;

// 游戏模式: 'menu' | 'level' | 'endless'
let gameMode = 'menu';
let levelIndex = 0;
let score = 0;
let platforms = [];
let player = null;
let gameState = 'menu';
let chargeStart = 0;
let currentPower = 0;
let currentPlatformIndex = 0;
let shakeTimer = 0;
let particles = [];
let highScore = parseInt(localStorage.getItem('jump_highscore') || '0');

// 无尽模式难度参数
let endlessDifficulty = 0;     // 跳过的平台数
let endlessSpeed = 0;
let endlessNarrow = 1.0;

// === 像素调色板 ===
const PAL = [
  { bg:'#0f380f', sky1:'#306230', sky2:'#0f380f', plat:'#8bac0f', platOk:'#306230', player:'#9bbc0f', goal:'#e0c000', shadow:'#0f380f' },
  { bg:'#1a1a2e', sky1:'#16213e', sky2:'#0f0f23', plat:'#5a5a8a', platOk:'#3a3a6a', player:'#8a8aba', goal:'#ffd700', shadow:'#0a0a18' },
  { bg:'#2d1b2e', sky1:'#4a2c4e', sky2:'#2d1b2e', plat:'#c05850', platOk:'#8a3a32', player:'#e07060', goal:'#f0c040', shadow:'#1a0a1a' },
];

function getPal() {
  return PAL[Math.floor(levelIndex / 4) % PAL.length];
}

// === 绘制工具 ===
function pixelRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(px(x - cameraX), px(y), px(w), px(h));
}
function screenRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(px(x), px(y), px(w), px(h));
}

// === 像素平台 ===
function drawPixelPlatform(p) {
  const x = px(p.x), y = px(p.y), w = px(p.w), h = p.h;
  const pal = getPal();
  const main = p.isGoal && !p.landed ? pal.goal : (p.landed ? pal.platOk : pal.plat);
  pixelRect(x + 2, y + 3, w, h, pal.shadow);
  pixelRect(x, y, w, h, main);
  pixelRect(x, y, w, 2, '#ffffff40');
  pixelRect(x, y + h - 2, w, 2, '#00000040');
  for (let tx = x + 8; tx < x + w - 4; tx += 8) {
    for (let ty = y + 4; ty < y + h - 2; ty += 4) {
      pixelRect(tx, ty, 2, 2, '#00000015');
    }
  }
  if (p.moving) {
    const cx = x + w / 2;
    pixelRect(cx - 4, y - 6, 8, 4, '#ffffff55');
    pixelRect(cx - 6, y - 4, 4, 4, '#ffffff55');
    pixelRect(cx + 2, y - 4, 4, 4, '#ffffff55');
  }
  if (p.isGoal && !p.landed && Math.floor(Date.now() / 400) % 2) {
    pixelRect(x - 2, y - 2, w + 4, h + 4, '#ffffff30');
  }
}

// === 像素角色 ===
function drawPixelPlayer() {
  const pal = getPal();
  const sx = px(player.x + (shakeTimer > 0 ? (Math.random() - 0.5) * shakeTimer * 1.5 : 0));
  const sy = px(player.y + (shakeTimer > 0 ? (Math.random() - 0.5) * shakeTimer * 1.5 : 0));
  const s = PLAYER_SIZE;
  pixelRect(sx - s / 2 + 2, sy + s - 2, s - 2, 3, pal.shadow + '80');
  const bc = pal.player;
  pixelRect(sx - s / 2 + 2, sy + 4, s - 4, s - 6, bc);
  pixelRect(sx - s / 2 + 4, sy, s - 8, 6, bc);
  pixelRect(sx - s / 2 + 4, sy, 4, 3, '#ffffff50');
  pixelRect(sx - s / 2 + 5, sy + 4, 3, 3, '#ffffff30');
  const eyeY = sy + 2;
  pixelRect(sx - 3, eyeY, 3, 3, '#ffffff');
  pixelRect(sx + 1, eyeY, 3, 3, '#ffffff');
  if (gameState === 'charging') {
    pixelRect(sx - 1, eyeY + 1, 2, 2, '#000000');
    pixelRect(sx + 3, eyeY + 1, 2, 2, '#000000');
  } else {
    pixelRect(sx, eyeY + 1, 2, 2, '#000000');
    pixelRect(sx + 4, eyeY + 1, 2, 2, '#000000');
  }
  pixelRect(sx - s / 2 + 2, sy + s - 2, s - 8, 3, '#00000060');
}

// === 粒子 ===
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({ x, y, vx: (Math.random() - 0.5) * 4, vy: -Math.random() * 5 - 2, life: 15 + Math.random() * 15, color, size: 1 + Math.floor(Math.random() * 2) });
  }
}
function drawParticles() {
  for (const p of particles) pixelRect(p.x, p.y, p.size, p.size, p.color + 'a0');
}
function updateParticles() {
  for (const p of particles) { p.x += p.vx; p.vy += 0.2; p.y += p.vy; p.life--; }
  particles = particles.filter(p => p.life > 0);
}

// === 星星 ===
function drawStarfield() {
  const seed = gameMode === 'endless' ? 42 : levelIndex * 137;
  for (let i = 0; i < 80; i++) {
    const sx = px((i * 197 + seed) % canvas.width);
    const sy = px((i * 313 + seed * 7) % (canvas.height - 80));
    const bright = (i % 5 === 0) ? '#ffffff80' : '#ffffff30';
    screenRect(sx, sy, (i % 7 === 0 ? 2 : 1), (i % 7 === 0 ? 2 : 1), bright);
  }
}

// === 蓄力条 ===
function drawPowerBar() {
  const barW = 48, barH = 6;
  const bx = px(player.x - barW / 2);
  const by = px(player.y - 20);
  const ratio = currentPower / MAX_POWER;
  pixelRect(bx - 2, by - 2, barW + 4, barH + 4, '#000000');
  pixelRect(bx, by, barW, barH, '#1a1a1a');
  for (let i = 0; i < barW * ratio; i += 2) {
    let color;
    if (i < barW * 0.4) color = '#44cc44';
    else if (i < barW * 0.7) color = '#cccc44';
    else color = '#cc4444';
    pixelRect(bx + i, by, 2, barH, color);
  }
  ctx.fillStyle = '#fff';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.round(ratio * 100) + '%', px(player.x - cameraX), by - 6);
}

// === 生成单个平台（无尽模式用） ===
function spawnPlatform(lastX) {
  const diff = endlessDifficulty;
  const minGap = 100 + diff * 8;
  const maxGap = 170 + diff * 12;
  const gap = minGap + Math.random() * (maxGap - minGap);
  const x = lastX + (70 * endlessNarrow) + gap;
  const w = Math.max(40, (90 + Math.random() * 40) * endlessNarrow);
  const isMoving = diff > 3 && Math.random() < Math.min(0.6, diff * 0.06);
  const spd = 0.3 + diff * 0.08;
  const moveRange = isMoving ? 30 + Math.random() * 50 : 0;

  return {
    x, y: 380 - Math.random() * 20, w, h: PLATFORM_H,
    moving: isMoving,
    moveDir: Math.random() > 0.5 ? 1 : -1,
    moveRange,
    moveSpeed: spd * (0.6 + Math.random() * 0.8),
    originX: x,
    landed: false,
    revealed: false,
  };
}

// === 初始化关卡模式 ===
function initLevel() {
  const lv = LEVELS[levelIndex];
  platforms = [];
  particles = [];
  platforms.push({ x: 80, y: 380, w: 100 * lv.narrow, h: PLATFORM_H, moving: false, moveDir:0, moveRange:0, moveSpeed:0, originX:80, landed:true, revealed:true });
  let lastX = 80;
  let mc = 0;
  for (let i = 1; i < lv.platforms; i++) {
    const gap = lv.minGap + Math.random() * (lv.maxGap - lv.minGap);
    const x = lastX + 100 * lv.narrow + gap;
    const w = Math.max(48, (80 + Math.random() * 50) * lv.narrow);
    const isMoving = mc < lv.moving && Math.random() < 0.7;
    const mr = isMoving ? 40 + Math.random() * 60 : 0;
    platforms.push({ x, y:380 - Math.random() * 20, w, h:PLATFORM_H, moving:isMoving, moveDir:Math.random()>0.5?1:-1, moveRange:mr, moveSpeed:lv.speed*(0.6+Math.random()*0.8), originX:x, landed:false, revealed:false });
    if (isMoving) mc++;
    lastX = x;
  }
  platforms[platforms.length-1].isGoal = true;
  if (platforms.length > 1) platforms[1].revealed = true;
  const sp = platforms[0];
  player = { x:sp.x+sp.w/2, y:sp.y-PLAYER_SIZE, vx:0, vy:0, onPlatform:0, size:PLAYER_SIZE };
  currentPlatformIndex = 0; currentPower = 0;
  gameState = 'waiting'; chargeStart = 0;
  cameraX = player.x - canvas.width/2; targetCameraX = cameraX;
  updateUI();
}

// === 初始化无尽模式 ===
function initEndless() {
  platforms = [];
  particles = [];
  endlessDifficulty = 0;
  endlessSpeed = 0;
  endlessNarrow = 1.0;

  // 生成前3个平台
  platforms.push({ x:80, y:380, w:100, h:PLATFORM_H, moving:false, moveDir:0, moveRange:0, moveSpeed:0, originX:80, landed:true, revealed:true });
  let lastX = 80;
  for (let i = 0; i < 2; i++) {
    const p = spawnPlatform(lastX);
    p.revealed = (i === 0); // 只显示第一个目标
    platforms.push(p);
    lastX = p.x;
  }
  const sp = platforms[0];
  player = { x:sp.x+sp.w/2, y:sp.y-PLAYER_SIZE, vx:0, vy:0, onPlatform:0, size:PLAYER_SIZE };
  currentPlatformIndex = 0; currentPower = 0;
  gameState = 'waiting'; chargeStart = 0;
  cameraX = player.x - canvas.width/2; targetCameraX = cameraX;
  document.getElementById('infoLeft').innerHTML = '最高 <span id="highScoreText">'+highScore+'</span>';
  document.getElementById('infoRight').innerHTML = '跳了 <span id="remainText">0</span>';
  updateUI();
}

// === 开始游戏 ===
function startGame(mode) {
  gameMode = mode;
  score = 0;
  levelIndex = 0;
  document.getElementById('menuOverlay').classList.remove('show');
  document.getElementById('settingsBtn').style.display = 'block';
  if (mode === 'level') {
    document.getElementById('infoLeft').innerHTML = '关卡 <span id="levelText">1</span>/10';
    document.getElementById('infoRight').innerHTML = '剩余 <span id="remainText">0</span>';
    initLevel();
  } else {
    initEndless();
  }
  document.getElementById('hint').textContent = '按住鼠标蓄力，松开起跳';
  document.getElementById('hint').className = 'hint ready';
}

// === 返回菜单 ===
function backToMenu() {
  gameMode = 'menu';
  gameState = 'menu';
  platforms = [];
  particles = [];
  document.getElementById('menuOverlay').classList.add('show');
  document.getElementById('settingsBtn').style.display = 'none';
  document.getElementById('hint').textContent = '';
  document.getElementById('hint').className = 'hint';
  document.getElementById('infoLeft').innerHTML = '关卡 <span id="levelText">1</span>/10';
  document.getElementById('infoRight').innerHTML = '剩余 <span id="remainText">0</span>';
  document.getElementById('scoreText').textContent = '0';
}

function updatePlatforms() {
  for (const p of platforms) {
    if (!p.moving) continue;
    p.x += p.moveDir * p.moveSpeed;
    if (Math.abs(p.x - p.originX) > p.moveRange) p.moveDir *= -1;
  }
}

function startCharge() {
  if (gameState !== 'waiting') return;
  gameState = 'charging';
  chargeStart = performance.now();
  currentPower = 0;
  document.getElementById('hint').textContent = '蓄力中... 松开起跳！';
  document.getElementById('hint').className = 'hint charging';
}

function doJump() {
  if (gameState !== 'charging') return;
  gameState = 'jumping';
  const power = Math.min((performance.now() - chargeStart) * POWER_RATE, MAX_POWER);
  const angle = -Math.PI / 4 - Math.random() * 0.06;
  player.vx = Math.cos(angle) * power;
  player.vy = Math.sin(angle) * power;
  player.onPlatform = -1;
  spawnParticles(player.x, player.y + PLAYER_SIZE, '#ffffff', 8);
  document.getElementById('hint').textContent = '空中...';
  document.getElementById('hint').className = 'hint';
}

function updatePhysics() {
  if (gameState !== 'jumping') { updateParticles(); return; }
  player.vy += GRAVITY;
  player.x += player.vx;
  player.y += player.vy;

  for (let i = 0; i < platforms.length; i++) {
    const p = platforms[i];
    if (player.x > p.x && player.x < p.x + p.w &&
        player.y + player.size >= p.y && player.y + player.size <= p.y + p.h + 6 &&
        player.vy >= 0 && player.y + player.size - player.vy <= p.y) {
      player.y = p.y - player.size;
      player.vy = 0; player.vx = 0;
      player.onPlatform = i;
      spawnParticles(player.x, player.y + player.size, '#ffffff', 5);

      if (i === currentPlatformIndex + 1) {
        currentPlatformIndex = i;
        p.landed = true;
        p.revealed = true;
        score += 10;

        if (gameMode === 'endless') {
          // 无尽模式：生成下一个平台，提高难度
          endlessDifficulty = currentPlatformIndex;
          endlessSpeed = 0.3 + endlessDifficulty * 0.08;
          endlessNarrow = Math.max(0.4, 1.0 - endlessDifficulty * 0.03);
          const lastP = platforms[platforms.length - 1];
          const newP = spawnPlatform(lastP.x);
          platforms.push(newP);
          // 清理远处的旧平台
          if (platforms.length > 8) {
            platforms = platforms.slice(platforms.length - 8);
            currentPlatformIndex = platforms.findIndex(p => p === player.platform) || 0;
            currentPlatformIndex = i - (platforms.length - 8 <= i ? platforms.length - 8 : 0);
            // 简化：裁剪后重新校准索引
            const pRef = platforms.find(p_ => p_.landed && p_.revealed);
            currentPlatformIndex = platforms.indexOf(platforms[i]);
          }
          // 更新最高分
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('jump_highscore', highScore);
            document.getElementById('highScoreText').textContent = highScore;
          }
          // 露出下一个
          if (currentPlatformIndex + 1 < platforms.length) {
            platforms[currentPlatformIndex + 1].revealed = true;
          }
          gameState = 'waiting';
          document.getElementById('hint').textContent = '按住鼠标蓄力，松开起跳';
          document.getElementById('hint').className = 'hint ready';
        } else {
          // 关卡模式
          if (i + 1 < platforms.length) platforms[i + 1].revealed = true;
          if (p.isGoal) {
            gameState = 'levelClear';
            score += 50;
            spawnParticles(p.x + p.w/2, p.y, '#ffd700', 20);
            document.getElementById('hint').textContent = '过关！点击进入下一关';
            document.getElementById('hint').className = 'hint ready';
            updateUI();
            return;
          }
          gameState = 'waiting';
          document.getElementById('hint').textContent = '按住鼠标蓄力，松开起跳';
          document.getElementById('hint').className = 'hint ready';
        }
      } else if (i === currentPlatformIndex) {
        gameState = 'waiting';
        document.getElementById('hint').textContent = '按住蓄力，松开起跳（跳太近了！）';
        document.getElementById('hint').className = 'hint ready';
      } else {
        // 跳到非相邻平台
        currentPlatformIndex = i;
        p.landed = true;
        p.revealed = true;
        score += 10;
        if (gameMode === 'endless') {
          endlessDifficulty = currentPlatformIndex;
          if (score > highScore) { highScore = score; localStorage.setItem('jump_highscore', highScore); }
        }
        if (i + 1 < platforms.length) platforms[i + 1].revealed = true;
        gameState = 'waiting';
        document.getElementById('hint').textContent = '按住鼠标蓄力，松开起跳';
        document.getElementById('hint').className = 'hint ready';
      }
      updateUI();
      return;
    }
  }

  if (player.y > canvas.height + 50 || player.x < -50) {
    gameState = 'gameOver';
    if (gameMode === 'endless' && score > highScore) {
      highScore = score;
      localStorage.setItem('jump_highscore', highScore);
    }
    // 无尽模式掉落后积分清零
    if (gameMode === 'endless') { score = 0; updateUI(); }
    document.getElementById('hint').textContent = gameMode === 'endless' ? '掉了！最高分:'+highScore+' 点击重试' : '掉下去了！点击重试';
    document.getElementById('hint').className = 'hint charging';
    shakeTimer = 15;
  }
  updateParticles();
}

// === 渲染 ===
function draw() {
  const pal = getPal();
  const stripes = 20;
  for (let i = 0; i < stripes; i++) {
    const t = i / stripes;
    const r = parseInt(pal.sky1.slice(1,3),16), g = parseInt(pal.sky1.slice(3,5),16), b = parseInt(pal.sky1.slice(5,7),16);
    const r2 = parseInt(pal.sky2.slice(1,3),16), g2 = parseInt(pal.sky2.slice(3,5),16), b2 = parseInt(pal.sky2.slice(5,7),16);
    const y = px(i * canvas.height / stripes);
    const h = px(canvas.height / stripes) + 1;
    screenRect(0, y, canvas.width, h, `rgb(${Math.floor(r+(r2-r)*t)},${Math.floor(g+(g2-g)*t)},${Math.floor(b+(b2-b)*t)})`);
  }
  drawStarfield();
  screenRect(0, 360, canvas.width, 16, '#00000020');
  for (let mx = 0; mx < canvas.width; mx += 32) {
    const mh = 8 + Math.floor(Math.abs(Math.sin((mx + cameraX*0.3)*0.02 + levelIndex))*20);
    screenRect(mx, 360 - mh, 32, mh + 20, '#00000015');
  }
  for (const p of platforms) { if (!p.revealed) continue; drawPixelPlatform(p); }
  drawParticles();
  drawPixelPlayer();
  if (gameState === 'charging') drawPowerBar();
  if (gameState === 'waiting' && currentPlatformIndex === 0 && gameMode === 'level') {
    ctx.fillStyle = '#ffffffaa';
    ctx.font = '12px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(LEVELS[levelIndex].name, canvas.width / 2, 50);
  }
  // 无尽模式显示当前跳数
  if (gameMode === 'endless' && gameState !== 'menu') {
    ctx.fillStyle = '#ffffffaa';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('已跳: ' + currentPlatformIndex, canvas.width / 2, 35);
  }
  const bw = 4;
  screenRect(0,0,canvas.width,bw,'#444444');
  screenRect(0,canvas.height-bw,canvas.width,bw,'#444444');
  screenRect(0,0,bw,canvas.height,'#444444');
  screenRect(canvas.width-bw,0,bw,canvas.height,'#444444');
  if (shakeTimer > 0) shakeTimer--;
}

// === 绘制菜单背景 ===
function drawMenuBackground() {
  const pal = PAL[0];
  const stripes = 20;
  for (let i = 0; i < stripes; i++) {
    const t = i / stripes;
    const r = parseInt(pal.sky1.slice(1,3),16), g = parseInt(pal.sky1.slice(3,5),16), b = parseInt(pal.sky1.slice(5,7),16);
    const r2 = parseInt(pal.sky2.slice(1,3),16), g2 = parseInt(pal.sky2.slice(3,5),16), b2 = parseInt(pal.sky2.slice(5,7),16);
    const y = px(i * canvas.height / stripes);
    screenRect(0, y, canvas.width, px(canvas.height/stripes)+1, `rgb(${Math.floor(r+(r2-r)*t)},${Math.floor(g+(g2-g)*t)},${Math.floor(b+(b2-b)*t)})`);
  }
  // 装饰星星
  for (let i = 0; i < 120; i++) {
    const sx = px((i*173+37) % canvas.width), sy = px((i*281+13) % (canvas.height-60));
    screenRect(sx, sy, (i%9===0?2:1), (i%9===0?2:1), (i%7===0?'#ffffffaa':'#ffffff40'));
  }
  // 装饰平台
  screenRect(100,370,140,PLATFORM_H,'#8bac0f');
  screenRect(100,370,140,2,'#ffffff40');
  screenRect(400,360,120,PLATFORM_H,'#8bac0f');
  screenRect(400,360,120,2,'#ffffff40');
  screenRect(650,375,90,PLATFORM_H,'#8bac0f');
  screenRect(650,375,90,2,'#ffffff40');
  // 装饰小人
  const mx = 170;
  screenRect(mx-10,350,20,20,'#9bbc0f');
  screenRect(mx-6,350,8,4,'#ffffff50');
  screenRect(mx-4,352,3,3,'#ffffff');
  screenRect(mx+1,352,3,3,'#ffffff');
  screenRect(mx-1,353,2,2,'#000000');
  screenRect(mx+4,353,2,2,'#000000');
  // 边框
  screenRect(0,0,canvas.width,4,'#444');
  screenRect(0,496,canvas.width,4,'#444');
  screenRect(0,0,4,500,'#444');
  screenRect(796,0,4,500,'#444');
}

function gameLoop(timestamp) {
  if (gameMode !== 'menu') {
    updatePlatforms();
    updatePhysics();
    targetCameraX = player.x - canvas.width / 2;
    cameraX += (targetCameraX - cameraX) * 0.1;
    if (gameState === 'charging') {
      currentPower = Math.min((timestamp - chargeStart) * POWER_RATE, MAX_POWER);
    }
    draw();
  } else {
    drawMenuBackground();
  }
  requestAnimationFrame(gameLoop);
}

function updateUI() {
  if (gameMode === 'level') {
    document.getElementById('levelText').textContent = levelIndex + 1;
    document.getElementById('remainText').textContent = platforms.length - currentPlatformIndex - 1;
  } else if (gameMode === 'endless') {
    document.getElementById('remainText').textContent = currentPlatformIndex;
  }
  document.getElementById('scoreText').textContent = score;
}

// === 设置面板 ===
const settingsBtn = document.getElementById('settingsBtn');
const settingsPanel = document.getElementById('settingsPanel');
const sensSlider = document.getElementById('sensSlider');
const sensVal = document.getElementById('sensVal');
const closeSettings = document.getElementById('closeSettings');
const presetBtns = document.querySelectorAll('.preset-btn');
sensSlider.value = sensitivity;
sensVal.textContent = sensitivity;
updatePresetHighlight(sensitivity);

function updatePresetHighlight(v) {
  presetBtns.forEach(b => b.classList.toggle('on', parseInt(b.dataset.v) === parseInt(v)));
}
settingsBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  const show = settingsPanel.classList.toggle('show');
  settingsBtn.classList.toggle('active', show);
});
closeSettings.addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPanel.classList.remove('show');
  settingsBtn.classList.remove('active');
});
canvas.addEventListener('mousedown', () => {
  settingsPanel.classList.remove('show');
  settingsBtn.classList.remove('active');
});
sensSlider.addEventListener('input', () => {
  sensitivity = parseInt(sensSlider.value);
  POWER_RATE = BASE_POWER_RATE * (sensitivity / 5);
  sensVal.textContent = sensitivity;
  localStorage.setItem('jump_sens', sensitivity);
  updatePresetHighlight(sensitivity);
});
presetBtns.forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    sensitivity = parseInt(btn.dataset.v);
    POWER_RATE = BASE_POWER_RATE * (sensitivity / 5);
    sensSlider.value = sensitivity;
    sensVal.textContent = sensitivity;
    localStorage.setItem('jump_sens', sensitivity);
    updatePresetHighlight(sensitivity);
  });
});

// === 菜单按钮 ===
document.getElementById('btnEndless').addEventListener('click', (e) => {
  e.stopPropagation();
  startGame('endless');
});
document.getElementById('btnLevel').addEventListener('click', (e) => {
  e.stopPropagation();
  startGame('level');
});

// === 游戏事件 ===
function handleAction() {
  if (settingsPanel.classList.contains('show')) return;
  if (gameState === 'waiting') startCharge();
  else if (gameState === 'gameOver') {
    if (gameMode === 'endless') initEndless();
    else initLevel();
  }
  else if (gameState === 'levelClear') {
    levelIndex++;
    if (levelIndex >= LEVELS.length) {
      alert('恭喜通关！\n你通过了全部10关！\n点击确定重新开始');
      levelIndex = 0; score = 0;
    }
    initLevel();
  }
}

canvas.addEventListener('mousedown', e => { e.preventDefault(); handleAction(); });
canvas.addEventListener('mouseup', e => { e.preventDefault(); if (gameState === 'charging') doJump(); });
canvas.addEventListener('mouseleave', () => { if (gameState === 'charging') doJump(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleAction(); });
canvas.addEventListener('touchend', e => { e.preventDefault(); if (gameState === 'charging') doJump(); });

// 设置面板中的返回主菜单按钮
document.getElementById('btnBackMenu').addEventListener('click', (e) => {
  e.stopPropagation();
  settingsPanel.classList.remove('show');
  settingsBtn.classList.remove('active');
  backToMenu();
});

// 键盘R键返回菜单
document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') {
    if (gameMode !== 'menu') backToMenu();
  }
});

// 启动
requestAnimationFrame(gameLoop);
</script>
